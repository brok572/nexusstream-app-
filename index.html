<!doctype html>
<html lang="en">
<head>
<title>n𝕖𝕩𝕦𝕤 Premium | Stream & Manage</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta charset="UTF-8" />
<meta name="theme-color" content="#4a148c">

<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(160deg, #0a0015 0%, #2d1b69 40%, #6a1b9a 100%);
  color: #fff;
  min-height: 100vh;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 60px 20px 100px;
  text-align: center;
}

.glass-card {
  background: rgba(255, 255, 255, 0.07);
  backdrop-filter: blur(25px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 32px;
  padding: 50px 35px;
  box-shadow: 0 25px 80px rgba(106, 27, 154, 0.4);
  margin-bottom: 50px;
}

.app-img {
  width: 180px;
  height: 180px;
  border-radius: 36px;
  margin-bottom: 30px;
  box-shadow: 0 15px 50px rgba(156, 39, 176, 0.6);
  border: 3px solid rgba(255,255,255,0.25);
}

.title {
  font-size: 3.2em;
  margin-bottom: 15px;
  background: linear-gradient(90deg, #f3e5f5, #ffffff, #e1bee7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 800;
}

.description {
  font-size: 1.2em;
  color: #d1c4e9;
  line-height: 1.8;
  margin-bottom: 45px;
}

.download-btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 18px 45px;
  background: linear-gradient(135deg, #8e24aa 0%, #d81b60 100%);
  color: white;
  font-size: 1.25em;
  font-weight: 700;
  text-decoration: none;
  border-radius: 60px;
  box-shadow: 0 12px 40px rgba(142, 36, 170, 0.7);
  transition: all 0.4s ease;
  border: 2px solid rgba(255,255,255,0.2);
}

.download-btn:hover {
  transform: translateY(-5px) scale(1.05);
  box-shadow: 0 20px 60px rgba(216, 27, 96, 0.9);
}

.download-icon,.tab-icon,.search-icon {
  width: 24px;
  height: 24px;
  fill: currentColor;
}

/* SEARCH BAR PREMIUM */
.search-wrapper {
  max-width: 600px;
  margin: 0 auto 50px;
  position: relative;
}

.search-input {
  width: 100%;
  padding: 18px 60px 18px 25px;
  background: rgba(255, 255, 255, 0.08);
  border: 2px solid rgba(255, 255, 255, 0.15);
  border-radius: 60px;
  color: white;
  font-size: 1.1em;
  outline: none;
  backdrop-filter: blur(15px);
  transition: all 0.3s ease;
}

.search-input:focus {
  border-color: #9c27b0;
  box-shadow: 0 0 30px rgba(156, 39, 176, 0.5);
}

.search-input::placeholder {
  color: #b39ddb;
}

.search-icon {
  position: absolute;
  right: 25px;
  top: 50%;
  transform: translateY(-50%);
  fill: #ce93d8;
  pointer-events: none;
}

/* TABS ZA SVG */
.tabs {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 40px;
  flex-wrap: wrap;
}

.tab-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 40px;
  background: rgba(255, 255, 255, 0.06);
  border: 2px solid rgba(255, 255, 255, 0.15);
  border-radius: 60px;
  color: #ce93d8;
  font-size: 1.15em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  backdrop-filter: blur(10px);
}

.tab-btn svg {
  width: 26px;
  height: 26px;
}

.tab-btn.active {
  background: linear-gradient(135deg, #9c27b0 0%, #e91e63 100%);
  border-color: rgba(255,255,255,0.4);
  color: white;
  box-shadow: 0 10px 30px rgba(156, 39, 176, 0.6);
  transform: scale(1.08);
}

.tab-btn:hover:not(.active) {
  background: rgba(255, 255, 255, 0.12);
  border-color: rgba(156, 39, 176, 0.5);
}

.section-title {
  font-size: 2.2em;
  margin-bottom: 35px;
  background: linear-gradient(90deg, #ce93d8, #fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 700;
}

/* GRID 12 34 56 = 2 columns */
.movies-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 25px;
  text-align: left;
}

.movie-card {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 24px;
  overflow: hidden;
  transition: all 0.4s ease;
  cursor: pointer;
}

.movie-card:hover {
  transform: translateY(-12px) scale(1.02);
  box-shadow: 0 30px 70px rgba(156, 39, 176, 0.6);
  border-color: rgba(156, 39, 176, 0.5);
}

.movie-card img {
  width: 100%;
  height: 380px;
  object-fit: cover;
}

.movie-info {
  padding: 18px;
}

.movie-title {
  font-size: 1.1em;
  font-weight: 600;
  margin-bottom: 8px;
  color: #fff;
}

.movie-year {
  font-size: 0.95em;
  color: #ba68c8;
}

.footer-premium {
  margin-top: 80px;
  padding-top: 30px;
  border-top: 1px solid rgba(255,255,255,0.1);
  color: #ab47bc;
  font-size: 1em;
  font-weight: 500;
  letter-spacing: 0.5px;
}

.loading {
  grid-column: 1 / -1;
  text-align: center;
  padding: 50px;
  color: #ba68c8;
  font-size: 1.2em;
}

@media (max-width: 768px){
.title{font-size: 2.4em;}
.movies-grid{grid-template-columns: 1fr;}
.movie-card img{height: 320px;}
.tab-btn{padding: 14px 25px; font-size: 1em;}
}
</style>
</head>
<body>

<div class="container">
  <div class="glass-card">
    <img src="https://www.appcreator24.com/srv/imgs/gen/3875181_ico.png?v=16" alt="App icon" class="app-img" />
    <h1 class="title">n𝕖𝕩𝕦𝕤 Premium</h1>
    <p class="description">Stream and manage your content seamlessly.<br>Ultra-fast, military-grade security, premium experience.</p>

    <a class="download-btn" download href="https://apk.e-droid.net/apk/app3875181-g9trcq.apk?v=16">
      <svg class="download-icon" viewBox="0 0 24 24">
        <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
      </svg>
      Download Premium APK
    </a>
    <p style="color: #ce93d8; font-size: 0.95em; margin-top: 12px; opacity: 0.8;">Android 8.0+ • 85MB • Premium Version</p>
  </div>

  <!-- SEARCH BAR -->
  <div class="search-wrapper">
    <input type="text" class="search-input" id="searchInput" placeholder="Tafuta movie yoyote..." onkeypress="if(event.key==='Enter') searchMovie()">
    <svg class="search-icon" viewBox="0 0 24 24">
      <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
    </svg>
  </div>

  <!-- TABS ZA SVG -->
  <div class="tabs">
    <button class="tab-btn active" onclick="loadMovies('Spiderman cast', this)">
      <svg class="tab-icon" viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
        <circle cx="12" cy="12" r="5"/>
      </svg>
      Spiderman
    </button>
    <button class="tab-btn" onclick="loadMovies('hulk', this)">
      <svg class="tab-icon" viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm3.5 6L12 10.5 8.5 8 12 5.5 15.5 8zM8.5 16L12 13.5 15.5 16 12 18.5 8.5 16z"/>
      </svg>
      Hulk
    </button>
    <button class="tab-btn" onclick="loadMovies('marvel', this)">
      <svg class="tab-icon" viewBox="0 0 24 24">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
      Marvel
    </button>
  </div>

  <h2 class="section-title" id="sectionTitle">🕷️ Spiderman Collection</h2>
  <div class="movies-grid" id="movies">
    <div class="loading">Inapakia movies...</div>
  </div>

  <div class="footer-premium">
    2026 nexusstream-co-tz.fwh.is | Premium Purple Edition 💜
  </div>
</div>

<script>
const API_BASE = 'https://imdb.iamidiotareyoutoo.com/search?q=';

function loadMovies(query, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');

  const titles = {
    'Spiderman cast': '🕷️ Spiderman Collection',
    'hulk': '💚 Hulk Collection',
    'marvel': '⚡ Marvel Universe'
  };
  document.getElementById('sectionTitle').textContent = titles[query] || '🔍 Search Results';

  document.getElementById('movies').innerHTML = '<div class="loading">Inapakia movies...</div>';

  fetch(API_BASE + encodeURIComponent(query))
  .then(res => res.json())
  .then(data => {
      const grid = document.getElementById('movies');
      grid.innerHTML = '';

      if(data.ok && data.description && data.description.length > 0){
        data.description.slice(0, 12).forEach(movie => {
          grid.innerHTML += `
            <div class="movie-card">
              <img src="${movie['#IMG_POSTER']}" alt="${movie['#TITLE']}" loading="lazy">
              <div class="movie-info">
                <div class="movie-title">${movie['#TITLE']}</div>
                <div class="movie-year">${movie['#YEAR']} • Rank ${movie['#RANK']}</div>
              </div>
            </div>
          `;
        });
      } else {
        grid.innerHTML = '<div class="loading">Hakuna movies zilizopatikana</div>';
      }
    });
}

function searchMovie() {
  const query = document.getElementById('searchInput').value.trim();
  if(query) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    loadMovies(query, null);
  }
}

// Load Spiderman kwa default
loadMovies('Spiderman cast', document.querySelector('.tab-btn.active'));
</script>

</body>
</html>
